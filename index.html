<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PET 英语学习助手</title>
<style>
:root { color-scheme: light; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #FFF8F0; color: #2D3436; min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}
#app { width: 100%; max-width: 480px; min-height: 100vh; display: flex; flex-direction: column; }

/* ===== COMMON ===== */
.btn-back {
  width: 40px; height: 40px; border-radius: 12px; border: none;
  background: white; color: #636E72; font-size: 1.2rem; cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: center;
}
.btn-back:active { transform: scale(0.95); }
.top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.progress-bar { flex: 1; height: 8px; background: #E9ECEF; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.progress-label { font-size: 0.8rem; color: #636E72; min-width: 48px; text-align: right; }
.btn-primary {
  display: block; width: 100%; padding: 16px; border: none; border-radius: 14px;
  font-size: 1.05rem; font-weight: 700; cursor: pointer; color: white;
  transition: transform 0.15s; box-shadow: 0 4px 14px rgba(255,107,107,0.3);
}
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled { background: #CED4DA !important; box-shadow: none; cursor: not-allowed; }
.btn-secondary {
  display: block; width: 100%; padding: 14px; border: 2px solid #E9ECEF; border-radius: 14px;
  background: white; color: #495057; font-size: 0.95rem; font-weight: 600; cursor: pointer;
}
.btn-secondary:active { background: #F8F9FA; }

/* ===== DASHBOARD ===== */
.dashboard { padding: 32px 24px; text-align: center; flex: 1; display: flex; flex-direction: column; }
.dashboard .logo { font-size: 3rem; margin-bottom: 4px; }
.dashboard h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 2px; color: #2D3436; }
.dashboard .subtitle { font-size: 0.8rem; color: #636E72; margin-bottom: 20px; }
.stat-cards { display: flex; gap: 10px; margin-bottom: 16px; }
.stat-card { flex: 1; background: white; border-radius: 14px; padding: 14px 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.stat-card .num { font-size: 1.6rem; font-weight: 800; line-height: 1; }
.stat-card .num.words { color: #4ECDC4; }
.stat-card .num.days { color: #FFD93D; }
.stat-card .num.points { color: #A855F7; }
.stat-card .label { font-size: 0.7rem; color: #636E72; margin-top: 4px; }

.pet-box {
  background: linear-gradient(135deg, #F3E8FF, #EDE9FE);
  border-radius: 16px; padding: 16px; margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04); position: relative; overflow: hidden;
}
.pet-emoji { font-size: 3.5rem; transition: transform 0.3s; cursor: pointer; line-height: 1; }
.pet-emoji:active { transform: scale(1.2); }
.pet-emoji:hover { animation: petBounce 0.5s; }
@keyframes petBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.pet-name { font-size: 0.9rem; font-weight: 700; color: #6D28D9; margin: 4px 0; }
.pet-level-bar { height: 10px; background: #DDD6FE; border-radius: 5px; margin: 8px 0; overflow: hidden; }
.pet-level-fill { height: 100%; background: linear-gradient(90deg, #A855F7, #7C3AED); border-radius: 5px; transition: width 0.5s; }
.pet-info { font-size: 0.72rem; color: #7C3AED; display: flex; justify-content: space-between; }
.pet-graduated { color: #F59E0B; font-weight: 700; font-size: 0.85rem; }
.pet-points-earned { font-size: 0.78rem; color: #10B981; font-weight: 600; animation: fadeUp 1s ease-out; }
@keyframes fadeUp { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
@keyframes levelUp { 0%{transform:scale(1)} 50%{transform:scale(1.3) rotate(10deg)} 100%{transform:scale(1) rotate(0)} }
.level-up { animation: levelUp 0.6s ease-out; }

.status-badge {
  display: inline-block; padding: 6px 16px; border-radius: 100px;
  font-size: 0.8rem; font-weight: 600; margin-bottom: 14px;
}
.status-badge.done { background: #D3F9D8; color: #2B8A3E; }
.status-badge.progress { background: #FFF3BF; color: #E67700; }
.status-badge.ready { background: #E9ECEF; color: #495057; }
.dash-btns { display: flex; flex-direction: column; gap: 10px; }

.btn-start {
  display: block; width: 100%; padding: 16px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #FF6B6B, #FF8787);
  color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 14px rgba(255,107,107,0.3); transition: transform 0.15s;
}
.btn-start:active { transform: scale(0.97); }

.dash-nav-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.dash-nav-btn {
  padding: 12px; border: 1.5px solid #E9ECEF; border-radius: 12px;
  background: white; color: #495057; font-size: 0.85rem; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.dash-nav-btn:active { background: #F8F9FA; }

/* ===== FLASHCARD ===== */
.flashcard-view { padding: 20px; flex: 1; display: flex; flex-direction: column; }
.flashcard-stage { flex: 1; display: flex; align-items: center; justify-content: center; }
.card-wrap { width: 100%; max-width: 360px; perspective: 1000px; }
.card-inner { position: relative; width: 100%; aspect-ratio: 4/3; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); transform-style: preserve-3d; }
.card-inner.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
.card-front { background: white; cursor: pointer; }
.card-front .word { font-size: 2.2rem; font-weight: 800; color: #2D3436; margin-bottom: 12px; }
.card-front .tap-hint { font-size: 0.8rem; color: #ADB5BD; }
.card-front .speaker { width: 48px; height: 48px; border-radius: 50%; background: #FFF0F0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-bottom: 16px; cursor: pointer; }
.card-back { background: linear-gradient(135deg, #FFF0F0, #FFF8F0); transform: rotateY(180deg); text-align: center; }
.card-back .meaning { font-size: 1.6rem; font-weight: 700; color: #FF6B6B; margin-bottom: 12px; }
.card-back .example { font-size: 0.95rem; color: #495057; margin-bottom: 6px; line-height: 1.6; }
.card-back .example-cn { font-size: 0.85rem; color: #868E96; }
.card-back .ex-speaker { margin-top: 12px; font-size: 0.8rem; color: #FF6B6B; cursor: pointer; padding: 6px 16px; border-radius: 100px; background: white; }
.btn-next-wrap { margin-top: 16px; text-align: center; }
.btn-next {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  background: #FF6B6B; color: white; font-size: 1.05rem; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 12px rgba(255,107,107,0.3);
}
.btn-next:active { transform: scale(0.97); }
.btn-next:disabled { background: #CED4DA; box-shadow: none; cursor: not-allowed; }

/* ===== QUIZ ===== */
.quiz-view { padding: 20px; flex: 1; display: flex; flex-direction: column; }
.quiz-header { text-align: center; margin-bottom: 8px; }
.quiz-header .quiz-type { font-size: 0.85rem; color: #FF6B6B; font-weight: 600; }
.quiz-question { text-align: center; margin: 16px 0; }
.quiz-question .question-word { font-size: 1.8rem; font-weight: 800; color: #2D3436; margin-bottom: 8px; }
.quiz-question .question-hint { font-size: 0.85rem; color: #636E72; }
.speaker-btn {
  width: 60px; height: 60px; border-radius: 50%; background: #FFF0F0; border: none;
  font-size: 1.8rem; cursor: pointer; margin: 8px auto; display: flex;
  align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(255,107,107,0.2);
}
.speaker-btn:active { transform: scale(0.9); }
.speaker-btn.playing { background: #FF6B6B; color: white; animation: pulse 0.8s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
.quiz-options { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; flex: 1; justify-content: center; }
.quiz-option {
  padding: 16px 20px; border-radius: 14px; border: 2.5px solid #E9ECEF;
  background: white; font-size: 1.05rem; cursor: pointer; text-align: center;
  transition: all 0.15s; font-weight: 500;
}
.quiz-option:active { transform: scale(0.98); }
.quiz-option.correct { border-color: #51CF66; background: #D3F9D8; color: #2B8A3E; }
.quiz-option.wrong { border-color: #FF6B6B; background: #FFF0F0; color: #E03131; }
.quiz-option.show-correct { border-color: #51CF66; background: #D3F9D8; color: #2B8A3E; }
.quiz-option.disabled { pointer-events: none; }

/* ===== SPELLING ===== */
.spell-view { padding: 20px; flex: 1; display: flex; flex-direction: column; }
.spell-question { text-align: center; margin: 12px 0; flex: 1; }
.spell-question .meaning-big { font-size: 1.5rem; font-weight: 700; color: #FF6B6B; margin-bottom: 8px; }
.spell-question .example-with-blank { font-size: 1.05rem; color: #495057; margin-bottom: 8px; line-height: 1.7; }
.spell-question .example-cn-small { font-size: 0.85rem; color: #868E96; margin-bottom: 16px; }
.spell-question .blank { color: #FF6B6B; font-weight: 700; letter-spacing: 3px; }
.spell-input-wrap { margin-top: 8px; position: relative; }
.spell-input {
  width: 100%; padding: 16px 56px 16px 16px; border-radius: 14px;
  border: 2.5px solid #E9ECEF; font-size: 1.3rem; text-align: center;
  outline: none; letter-spacing: 2px; transition: border-color 0.15s; font-family: "SF Mono", "Menlo", "Consolas", monospace;
}
.spell-input:focus { border-color: #FF6B6B; }
.spell-mic {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: #F0F0FF; color: #6C5CE7; font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.spell-mic:active { transform: translateY(-50%) scale(0.9); }
.spell-mic.listening { background: #FF6B6B; color: white; animation: micPulse 1s infinite; }
@keyframes micPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.5); } 50% { box-shadow: 0 0 0 14px rgba(255,107,107,0); } }
.spell-mic.hidden { display: none; }
.spell-hint { font-size: 0.85rem; color: #FF6B6B; margin-top: 8px; min-height: 20px; }
.btn-submit {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  background: #FF6B6B; color: white; font-size: 1.05rem; font-weight: 700; cursor: pointer; margin-top: 12px;
}
.btn-submit:active { transform: scale(0.97); }
.btn-submit:disabled { background: #CED4DA; cursor: not-allowed; }
.spell-feedback { text-align: center; font-size: 1rem; font-weight: 600; margin-top: 8px; min-height: 28px; }

/* ===== COMPLETE / PROGRESS / BROWSE ===== */
.page-view { padding: 24px 20px; flex: 1; display: flex; flex-direction: column; }
.page-view h2 { font-size: 1.2rem; text-align: center; margin-bottom: 4px; }
.page-empty { text-align: center; padding: 40px 20px; color: #868E96; }
.page-empty .icon { font-size: 3rem; margin-bottom: 12px; }

.complete-view { padding: 32px 24px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; }
.complete-view .emoji { font-size: 4rem; margin-bottom: 12px; }
.complete-view h2 { font-size: 1.4rem; margin-bottom: 6px; }
.complete-view .message { font-size: 0.95rem; color: #495057; margin-bottom: 20px; line-height: 1.6; }
.complete-stats { display: flex; gap: 10px; margin-bottom: 16px; }
.complete-stat { flex: 1; background: white; border-radius: 14px; padding: 14px 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.complete-stat .val { font-size: 1.4rem; font-weight: 800; }
.complete-stat .val.green { color: #51CF66; }
.complete-stat .val.yellow { color: #FFD93D; }
.complete-stat .val.purple { color: #A855F7; }
.complete-stat .lbl { font-size: 0.68rem; color: #636E72; margin-top: 4px; }
.btn-done {
  display: block; width: 100%; padding: 14px; border: none; border-radius: 14px;
  background: #51CF66; color: white; font-size: 1.05rem; font-weight: 700; cursor: pointer;
}
.btn-extra {
  display: block; width: 100%; padding: 14px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #A855F7, #7C3AED); color: white;
  font-size: 1rem; font-weight: 700; cursor: pointer; margin-bottom: 10px;
  box-shadow: 0 4px 14px rgba(168,85,247,0.3);
}
.btn-extra:active { transform: scale(0.97); }

/* ===== WRONG BOOK ===== */
.wrongbook-header { margin-bottom: 16px; }
.wrongbook-list { flex: 1; overflow-y: auto; }
.wrongbook-item {
  background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between;
}
.wrongbook-item .wrong-word { font-size: 1.1rem; font-weight: 700; color: #2D3436; }
.wrongbook-item .wrong-meaning { font-size: 0.85rem; color: #636E72; }
.wrongbook-item .wrong-count { background: #FF6B6B; color: white; border-radius: 100px; padding: 2px 10px; font-size: 0.75rem; font-weight: 600; }
.wrongbook-item .btn-retry { padding: 8px 14px; border: none; border-radius: 10px; background: #FFF0F0; color: #FF6B6B; font-weight: 600; font-size: 0.8rem; cursor: pointer; }
.wrongbook-stats { text-align: center; font-size: 0.85rem; color: #636E72; margin-bottom: 14px; }
.retry-quiz { background: #FFF5F5; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.retry-quiz .quiz-type { font-size: 0.8rem; color: #FF6B6B; font-weight: 600; margin-bottom: 8px; }
.retry-quiz .quiz-options { gap: 8px; margin-top: 0; }

/* ===== PROGRESS PAGE ===== */
.progress-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.progress-card { background: white; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.progress-card h3 { font-size: 0.95rem; margin-bottom: 10px; color: #2D3436; }
.chart-bar-group { display: flex; gap: 6px; align-items: flex-end; padding: 8px 0; height: 100px; }
.chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; justify-content: flex-end; height: 100%; }
.chart-bar { width: 100%; max-width: 36px; border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.4s; }
.chart-label { font-size: 0.65rem; color: #ADB5BD; }
.topic-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.topic-name { font-size: 0.82rem; min-width: 80px; }
.topic-bar-wrap { flex: 1; height: 8px; background: #E9ECEF; border-radius: 4px; overflow: hidden; }
.topic-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
.topic-pct { font-size: 0.75rem; font-weight: 600; min-width: 36px; text-align: right; }

/* ===== BROWSE PAGE ===== */
.browse-controls { display: flex; gap: 6px; margin-bottom: 10px; }
.browse-search { flex: 1; padding: 10px 14px; border: 1.5px solid #E9ECEF; border-radius: 12px; font-size: 0.9rem; outline: none; background: white; }
.browse-search:focus { border-color: #FF6B6B; }
.browse-filter { padding: 10px 12px; border: 1.5px solid #E9ECEF; border-radius: 12px; font-size: 0.85rem; background: white; cursor: pointer; }
.topic-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 12px; }
.topic-tab {
  padding: 6px 14px; border: 1.5px solid #E9ECEF; border-radius: 100px; background: white;
  font-size: 0.75rem; cursor: pointer; white-space: nowrap; color: #636E72;
}
.topic-tab.active { background: #FF6B6B; border-color: #FF6B6B; color: white; }
.word-list { list-style: none; flex: 1; overflow-y: auto; }
.word-item {
  display: flex; align-items: center; justify-content: space-between; padding: 10px 0;
  border-bottom: 1px solid #F1F3F5; cursor: pointer;
}
.word-item:active { background: #FFF5F5; }
.word-main { font-family: "SF Mono", "Menlo", "Consolas", monospace; font-weight: 700; font-size: 1rem; }
.word-pos { font-size: 0.7rem; background: #F3E8FF; color: #7C3AED; padding: 2px 8px; border-radius: 4px; }
.word-level { font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.word-level.L1 { background: #D3F9D8; color: #2B8A3E; }
.word-level.L2 { background: #FFF3BF; color: #E67700; }
.word-level.L3 { background: #FFE3E3; color: #C92A2A; }

/* ===== WORD DETAIL MODAL ===== */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-content { background: white; border-radius: 18px; padding: 24px; max-width: 400px; width: 100%; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-close { float: right; background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #ADB5BD; }
.detail-word { font-family: "SF Mono", "Menlo", "Consolas", monospace; font-size: 1.6rem; font-weight: 800; color: #FF6B6B; margin-bottom: 8px; }
.detail-row { display: flex; gap: 8px; align-items: baseline; margin-bottom: 4px; }
.detail-label { font-size: 0.75rem; font-weight: 600; color: #868E96; min-width: 48px; }
.detail-val { font-size: 0.9rem; }
.detail-example { background: #FFF8F0; padding: 12px; border-radius: 10px; margin-top: 12px; }

/* ===== READING MODULE ===== */
.reading-textarea { width: 100%; min-height: 200px; padding: 14px; border: 2px solid #E9ECEF; border-radius: 14px; font-size: 0.95rem; font-family: inherit; line-height: 1.8; resize: vertical; outline: none; transition: border-color 0.15s; background: white; }
.reading-textarea:focus { border-color: #FF6B6B; }
.reading-full-text-wrap { position: relative; max-height: 55vh; overflow-y: auto; overflow-x: hidden; background: white; border-radius: 14px; padding: 20px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); font-size: 1.15rem; line-height: 2.2; scroll-behavior: smooth; word-break: normal; overflow-wrap: break-word; hyphens: manual; }
.reading-full-text-wrap .word-token { display: inline-block; padding: 2px 5px; border-radius: 5px; transition: background 0.2s, color 0.2s; cursor: default; margin: 0 1px; white-space: normal; }
.reading-full-text-wrap .word-token.correct { background: #D3F9D8; color: #2B8A3E; }
.reading-full-text-wrap .word-token.wrong { background: #FFE3E3; color: #C92A2A; }
.reading-full-text-wrap .word-token.skipped { background: #FFF3BF; color: #E67700; }
.reading-full-text-wrap .word-token.current { background: #FF6B6B; color: white; border-radius: 5px; animation: tokenFlash 0.6s infinite alternate; }
@keyframes tokenFlash { from { opacity: 1; } to { opacity: 0.7; } }
.reading-status { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 8px 0; padding: 10px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; }
.reading-status.listening { background: #FFF0F0; color: #FF6B6B; animation: pulseBg 1.5s infinite; }
@keyframes pulseBg { 0%,100% { background: #FFF0F0; } 50% { background: #FFE0E0; } }
.reading-status.paused { background: #E9ECEF; color: #495057; }
.reading-status.done { background: #D3F9D8; color: #2B8A3E; }
.reading-heard { font-size: 0.85rem; color: #868E96; text-align: center; margin: 4px 0; min-height: 22px; }
.reading-heard strong { color: #FF6B6B; }
.reading-report-word { display: inline-block; background: #FFE3E3; color: #C92A2A; padding: 4px 10px; border-radius: 100px; margin: 3px; font-size: 0.85rem; font-family: "SF Mono","Menlo","Consolas",monospace; cursor: pointer; }
.reading-report-word:hover { background: #FFC9C9; }
.error-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #FFF5F5; border-radius: 12px; margin-bottom: 6px; gap: 8px; }
.error-row .error-target { font-family: "SF Mono","Menlo","Consolas",monospace; font-weight: 700; color: #C92A2A; }
.error-row .error-spoken { font-size: 0.85rem; color: #868E96; }
.error-row .error-arrow { color: #FF6B6B; font-size: 1.2rem; }
.text-card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.15s; }
.text-card:active { transform: scale(0.98); }
.text-card .text-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; overflow: hidden; text-overflow:ellipsis; white-space:nowrap; }
.text-card .text-preview { font-size: 0.82rem; color: #868E96; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.text-card .text-meta { font-size: 0.7rem; color: #ADB5BD; margin-top: 4px; }
.correction-round-badge { display: inline-block; background: #FF6B6B; color: white; border-radius: 100px; padding: 2px 10px; font-size: 0.75rem; font-weight: 600; }

/* ===== RESPONSIVE ===== */
@media (max-width: 360px) {
  .card-front .word { font-size: 1.8rem; }
  .card-back .meaning { font-size: 1.3rem; }
  .quiz-option { padding: 14px 16px; font-size: 0.95rem; }
}
@keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.pop { animation: popIn 0.3s ease-out; }
@keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-6px); } 40%,80% { transform: translateX(6px); } }
.shake { animation: shake 0.4s ease-out; }
</style>
</head>
<body>
<div id="app"></div>
<script src="js/vocabulary.js"></script>
<script>
// ============================================================
// PET COMPANION SYSTEM
// ============================================================
const PET_STAGES = [
  { emoji:'🥚', name:'宠物蛋', pts:0 },
  { emoji:'🐣', name:'小啾啾', pts:50 },
  { emoji:'🐥', name:'小黄鸡', pts:150 },
  { emoji:'🐱', name:'小猫咪', pts:300 },
  { emoji:'🐶', name:'小狗狗', pts:500 },
  { emoji:'🦊', name:'小狐狸', pts:750 },
  { emoji:'🐼', name:'小熊猫', pts:1050 },
  { emoji:'🐯', name:'小老虎', pts:1400 },
  { emoji:'🐉', name:'小龙龙', pts:1800 },
  { emoji:'🦄', name:'毕业独角兽', pts:2300 },
];
const PTS_CORRECT = 5;
const PTS_DAY_COMPLETE = 10;
const PTS_WORD_MASTERED = 3;

function getPetLevel(p) { let l=0; for(let i=PET_STAGES.length-1;i>=0;i--){if(p>=PET_STAGES[i].pts){l=i;break;}} return l; }
function getPetProgress(p){const l=getPetLevel(p);if(l>=PET_STAGES.length-1)return 100;return Math.round((p-PET_STAGES[l].pts)/(PET_STAGES[l+1].pts-PET_STAGES[l].pts)*100);}
function getPetStage(p){return PET_STAGES[Math.min(getPetLevel(p),PET_STAGES.length-1)];}

// ============================================================
// STATE MANAGEMENT
// ============================================================
const STORE = 'pet_helper_v2';
function defaultState(){
  return {
    wordBank: PET_VOCABULARY.map(w=>({...w, reviewLevel:-1, nextReview:null, learnedDate:null, wrongCount:0, correctStreak:0})),
    dailyState: null,
    history: [],
    wrongBook: {},
    points: 0,
    petNotifiedLevel: 0,
    settings: { dailyNewWords: 10, voiceRate: 0.85 },
    readingTexts: [],
    readingHistory: []
  };
}
function load(){ try{let r=localStorage.getItem(STORE);if(r){let s=JSON.parse(r);s.wordBank.forEach(w=>{if(!w.correctStreak)w.correctStreak=0;});return s;}}catch(e){} return defaultState(); }
function save(){ try{localStorage.setItem(STORE,JSON.stringify(A));}catch(e){} }

// ============================================================
// HELPERS
// ============================================================
function today(){ return new Date().toISOString().slice(0,10); }
function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
function pickRandom(arr,n,exclude){return shuffle(arr.filter(x=>!exclude||!exclude.includes(x))).slice(0,n);}
function getNextReview(l){const d=new Date();if(l===0)d.setDate(d.getDate());if(l===1)d.setDate(d.getDate()+1);if(l===2)d.setDate(d.getDate()+3);if(l===3)d.setDate(d.getDate()+7);if(l===4)d.setDate(d.getDate()+14);if(l===5)d.setDate(d.getDate()+30);return d.toISOString().slice(0,10);}

// ============================================================
// SRS / WORD SELECTION
// ============================================================
function getWordsForToday(count){
  count=count||A.settings.dailyNewWords;
  const todayStr=today();
  const unlearned=A.wordBank.filter(w=>w.reviewLevel<0);
  if(unlearned.length===0)return{newWords:[],reviewWords:[]};
  // Pick from topic with most remaining
  const tc={}; unlearned.forEach(w=>{tc[w.topic]=(tc[w.topic]||0)+1;});
  const entries=Object.entries(tc).sort((a,b)=>b[1]-a[1]);
  const pickTopic=entries[0][0];
  const topicWords=unlearned.filter(w=>w.topic===pickTopic);
  const newWords=topicWords.slice(0,count);
  // Mix in mistake words (up to 30%)
  const mistakeIds=Object.keys(A.wrongBook);
  if(mistakeIds.length>0){
    const mws=unlearned.filter(w=>mistakeIds.includes(w.id)&&!newWords.find(n=>n.id===w.id));
    const mc=Math.min(Math.ceil(count*0.3),mws.length);
    const pickedM=shuffle(mws).slice(0,mc);
    newWords.splice(-pickedM.length,pickedM.length,...pickedM);
  }
  const reviewWords=A.wordBank.filter(w=>w.reviewLevel>=0&&w.nextReview&&w.nextReview<=todayStr&&!newWords.find(n=>n.id===w.id));
  return {newWords,reviewWords};
}

// ============================================================
// POINTS & WRONG BOOK
// ============================================================
let pendingPoints=0;
let petLeveledUp=false;
function addPoints(pts){
  const old=getPetLevel(A.points); A.points=(A.points||0)+pts; pendingPoints+=pts;
  const n=getPetLevel(A.points); if(n>old&&n>(A.petNotifiedLevel||0)){petLeveledUp=true;A.petNotifiedLevel=n;}
}
function addWrong(wordId,spelling,source){const w=A.wrongBook;if(!w[wordId])w[wordId]={count:0,lastWrong:Date.now(),attempts:[],sources:{}};w[wordId].count++;w[wordId].lastWrong=Date.now();if(spelling&&!w[wordId].attempts.includes(spelling)){w[wordId].attempts.unshift(spelling);if(w[wordId].attempts.length>5)w[wordId].attempts.pop();}if(source){const s=w[wordId].sources;if(!s[source])s[source]=0;s[source]++;}save();}
function removeWrong(wordId){delete A.wrongBook[wordId];save();}

// ============================================================
// SPEECH
// ============================================================
function speak(text,rate){return new Promise(r=>{if(!window.speechSynthesis){r();return;}window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=rate||0.85;u.onend=r;u.onerror=r;window.speechSynthesis.speak(u);});}

// ============================================================
// VOICE INPUT — letter-by-letter spelling recognition
// ============================================================
let voiceRec=null, voiceTimer=null, voiceRetryCount=0;
function startVoice(id,micId){
  const mic=document.getElementById(micId),inp=document.getElementById(id);
  if(!mic||!inp)return;
  const R=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!R){mic.classList.add('hidden');inp.placeholder='浏览器不支持语音';inp.focus();return;}
  if(voiceRec){voiceRec.stop();return;}
  voiceRec=new R();
  // Use single-shot recognition per letter group — NOT continuous
  voiceRec.lang='en-US';
  voiceRec.interimResults=true;
  voiceRec.continuous=false;
  voiceRec.maxAlternatives=5;
  mic.classList.add('listening');mic.textContent='⏺️';
  voiceRetryCount=0;

  voiceRec.onresult=function(e){
    clearTimeout(voiceTimer);
    // Collect ALL alternatives from ALL results, pick the best one
    let best='',bestConf=0;
    for(let i=0;i<e.results.length;i++){
      for(let j=0;j<e.results[i].length;j++){
        const raw=e.results[i][j].transcript;
        const conf=e.results[i][j].confidence;
        // Try to interpret as letters
        const letters=speechToLetters(raw);
        if(letters.length>0&&conf>bestConf){best=letters;bestConf=conf;}
      }
    }
    // If we got a good result, use it (replace, don't append)
    if(best.length>0&&bestConf>0.1){
      inp.value=best;
    }
    // Auto-stop after 1.5s of silence
    voiceTimer=setTimeout(()=>{if(voiceRec)voiceRec.stop();},1500);
  };
  voiceRec.onerror=function(e){
    if(e.error==='no-speech'){
      voiceRetryCount++;
      if(voiceRetryCount<5){try{voiceRec.start();}catch(x){stopVoice(micId);}return;}
    }
    if(e.error==='aborted')return;
    stopVoice(micId);
  };
  voiceRec.onend=function(){
    // If input is still empty and we haven't retried too much, restart
    if(inp.value.trim()===''&&voiceRetryCount<8){
      voiceRetryCount++;
      try{voiceRec=new R();voiceRec.lang='en-US';voiceRec.interimResults=true;voiceRec.continuous=false;voiceRec.maxAlternatives=5;
        voiceRec.onresult=voiceRec.onresult;voiceRec.onerror=voiceRec.onerror;voiceRec.onend=voiceRec.onend;
        voiceRec.start();return;}catch(x){}
    }
    stopVoice(micId);inp.focus();
  };
  try{voiceRec.start();}catch(x){stopVoice(micId);}
}

// Map speech-to-text results to actual letters
// SpeechRecognition hears "A B C" as "a b c" or "abc"
function speechToLetters(raw){
  const s=raw.toLowerCase().trim();
  if(!s)return'';

  // Phonetic letter names that speech engine might return as words
  const phoneticMap={
    'a':1,'ay':1,'eh':1,'hey':1,'b':1,'bee':1,'be':1,'c':1,'sea':1,'see':1,'si':1,
    'd':1,'dee':1,'the':0,'e':1,'ee':1,'f':1,'eff':1,'if':1,'g':1,'gee':1,'ji':1,
    'h':1,'aitch':1,'age':1,'each':1,'i':1,'eye':1,'ai':1,'j':1,'jay':1,'k':1,'kay':1,'okay':1,
    'l':1,'el':1,'elle':1,'m':1,'em':1,'n':1,'en':1,'and':1,'in':1,'o':1,'oh':1,'p':1,'pea':1,'pee':1,
    'q':1,'cue':1,'queue':1,'r':1,'are':1,'our':1,'s':1,'ess':1,'yes':1,'t':1,'tea':1,'tee':1,'u':1,'you':1,'ewe':1,
    'v':1,'vee':1,'we':1,'w':1,'double u':1,'double you':1,'x':1,'ex':1,'eggs':1,'y':1,'why':1,'z':1,'zed':1,'zee':1,
    // Common words that contain letters
    'double':1,'you':1,'space':1,
    // Numbers that get confused as words
    'one':1,'1':1,'two':1,'2':1,'to':1,'too':1,'for':1,'four':1,'4':1,
  };

  // Strategy 1: If the speech is just space-separated single letters (like "a p p l e")
  const parts=s.split(/\s+/);
  const allSingleLetters=parts.every(p=>p.length===1&&p>='a'&&p<='z');
  if(allSingleLetters)return parts.join('');

  // Strategy 2: If speech is one long word, it might be letter names run together
  // or it might be the actual word pronounced — try phonetic decomposition
  // First check if the input looks like a clean word (not letter names)
  const looksLikeWord=s.match(/^[a-z]{2,15}$/);
  if(looksLikeWord){
    // It might be the actual word — return it directly so user can verify
    // But also try to detect if it's letter names
    // Let's check if any part matches a known phonetic letter name
    const hasPhoneticParts=parts.some(p=>phoneticMap[p]);
    if(!hasPhoneticParts)return s;
  }

  // Strategy 3: Build from phonetic letter names
  let result='';
  let i=0;
  const tokens=s.split(/\s+/);
  while(i<tokens.length){
    const t=tokens[i];
    // Check for "double X" pattern (e.g. "double u" → w)
    if(t==='double'&&i+1<tokens.length){
      const next=tokens[i+1];
      if(next==='u'||next==='you')result+='w';
      else if(next.length===1)result+=next+next;
      else{
        const mapped=phoneticMap[next];
        if(mapped===1)result+=next+next;
      }
      i+=2;continue;
    }
    // Single letter
    if(t.length===1&&t>='a'&&t<='z'){result+=t;i++;continue;}
    // Known phonetic name
    if(t in phoneticMap){result+=t[0];i++;continue;}
    // Long word — try to extract letters
    for(let j=0;j<t.length;j++){if(t[j]>='a'&&t[j]<='z')result+=t[j];}
    i++;
  }
  return result;
}

function stopVoice(micId){clearTimeout(voiceTimer);voiceTimer=null;voiceRetryCount=0;const m=document.getElementById(micId);if(m){m.classList.remove('listening');m.textContent='🎤';}if(voiceRec){try{voiceRec.stop();}catch(e){}voiceRec=null;}}

// ============================================================
// RENDER ENGINE
// ============================================================
let A=null; const app=document.getElementById('app');
function initDaily(){
  const ts=today();
  if(!A.dailyState||A.dailyState.date!==ts){
    pendingPoints=0;petLeveledUp=false;
    const {newWords,reviewWords}=getWordsForToday(A);
    A.dailyState={date:ts,phase:newWords.length>0?'flashcard':(reviewWords.length>0?'review':'complete'),newWordIds:newWords.map(w=>w.id),currentCard:0,currentQuiz:0,quizType:'sight',quizResults:[],reviewQueue:reviewWords.map(w=>w.id),reviewIdx:0,reviewResults:[],seenCards:0,isExtra:false};
    save();
  }
}
function render(){
  initDaily();const ds=A.dailyState;
  switch(ds.phase){
    case 'flashcard': renderFC(); break;
    case 'sight-quiz':case 'sound-quiz':case 'spell-quiz': renderQuiz(); break;
    case 'review': renderReview(); break;
    case 'complete': renderComplete(); break;
    case 'wrongbook': renderWB(); break;
    case 'progress': renderProgress(); break;
    case 'browse': renderBrowse(); break;
    case 'reading-list': case 'reading-active': case 'reading-report': case 'reading-correction': renderReading(); break;
    default: renderDashboard();
  }
}

// ===== DASHBOARD =====
function renderDashboard(){
  const learned=A.wordBank.filter(w=>w.reviewLevel>=0).length;
  let streak=0; const hist=[...A.history].reverse();const ts=today();
  for(const h of hist){if(h.date===ts)continue;if(h.wordsLearned>0||h.wordsReviewed>0)streak++;else break;}
  const ds=A.dailyState; if(ds&&ds.phase==='complete')streak++;
  const isDone=ds&&ds.phase==='complete';const isProg=ds&&ds.phase!=='complete'&&ds.date===ts;
  const sl=isDone?'✅ 今日已完成':(isProg?'⏳ 进行中':'📋 准备开始');
  const sc=isDone?'done':(isProg?'progress':'ready');
  const pet=getPetStage(A.points||0);const pl=getPetLevel(A.points||0);
  const pp=getPetProgress(A.points||0);const isGrad=pl>=PET_STAGES.length-1;
  const wrongCount=Object.values(A.wrongBook).reduce((s,e)=>s+e.count,0);
  const petStats=A.wordBank.filter(w=>w.reviewLevel>=5).length;

  let petHtml='';
  if(petLeveledUp&&!isGrad){petHtml=`<div class="pet-points-earned">🎉 升级到 <strong>${pet.name}</strong>！</div>`;petLeveledUp=false;}
  else if(pendingPoints>0){petHtml=`<div class="pet-points-earned">+${pendingPoints} 积分！继续加油！</div>`;pendingPoints=0;}

  app.innerHTML=`<div class="dashboard">
    <div class="pet-box ${petLeveledUp?'level-up':''}" onclick="petClick()">
      <div class="pet-emoji">${pet.emoji}</div>
      <div class="pet-name">${pet.name}${isGrad?' 🎓':''}</div>
      ${isGrad?'<div class="pet-graduated">🏆 已毕业！太厉害了！</div>':`<div class="pet-level-bar"><div class="pet-level-fill" style="width:${pp}%"></div></div><div class="pet-info"><span>Lv.${pl+1}</span><span>${A.points||0} 积分</span><span>→ Lv.${pl+2}</span></div>`}
      ${petHtml}
    </div>
    <div class="stat-cards">
      <div class="stat-card"><div class="num words">${learned}</div><div class="label">累计词汇</div></div>
      <div class="stat-card"><div class="num">${A.history.length||0}</div><div class="label">学习天数</div></div>
      <div class="stat-card"><div class="num days">${streak}🔥</div><div class="label">连续打卡</div></div>
    </div>
    <div class="stat-cards">
      <div class="stat-card"><div class="num points">${A.points||0}</div><div class="label">总积分</div></div>
      <div class="stat-card"><div class="num">${petStats}</div><div class="label">已掌握</div></div>
      <div class="stat-card"><div class="num" style="color:#636E72">${wrongCount}</div><div class="label">错题</div></div>
    </div>
    <div class="status-badge ${sc}">${sl}</div>
    <div class="dash-btns">
      ${isDone?`<button class="btn-start" style="background:#51CF66;" onclick="startReview()">🔄 再复习一次</button>`:`
        <button class="btn-start" onclick="startSession()">${isProg?'▶️ 继续学习':'🚀 开始学习'}</button>
      `}
      <button class="btn-secondary" onclick="openWB()">📕 错词本${wrongCount>0?' ('+wrongCount+'题)':''}</button>
    </div>
    <div class="dash-nav-btns">
      <button class="dash-nav-btn" onclick="showProgress()">📊 学习进度</button>
      <button class="dash-nav-btn" onclick="showReading()">📖 朗读练习</button>
      <button class="dash-nav-btn" onclick="showBrowse()">📚 词汇库</button>
    </div>
  </div>`;
}
function petClick(){const pet=getPetStage(A.points||0);if(getPetLevel(A.points||0)>=PET_STAGES.length-1){speak('Congratulations! Your pet graduated!',0.8);}else{speak('Hello! Keep learning to help me grow!',0.8);}}

function startSession(){initDaily();const ds=A.dailyState;ds.phase=ds.newWordIds.length>0?'flashcard':(ds.reviewQueue.length>0?'review':'complete');ds.isExtra=false;save();render();}
function startReview(){const rw=A.wordBank.filter(w=>w.reviewLevel>=0&&w.reviewLevel<4).slice(0,10);A.dailyState.reviewQueue=rw.map(w=>w.id);A.dailyState.reviewIdx=0;A.dailyState.reviewResults=[];A.dailyState.phase='review';A.dailyState.newWordIds=[];A.dailyState.quizResults=[];save();render();}
function startExtra5(){const {newWords}=getWordsForToday(5);if(newWords.length===0)return;const ds=A.dailyState;ds.newWordIds=newWords.map(w=>w.id);ds.currentCard=0;ds.currentQuiz=0;ds.quizType='sight';ds.quizResults=[];ds.reviewQueue=[];ds.reviewIdx=0;ds.reviewResults=[];ds.isExtra=true;ds.phase='flashcard';save();render();}

// ===== FLASHCARD =====
let cardFlipped=false;
function renderFC(){
  const ds=A.dailyState;const idx=ds.currentCard;
  const nw=ds.newWordIds.map(id=>A.wordBank.find(w=>w.id===id)).filter(Boolean);
  if(idx>=nw.length){ds.phase='sight-quiz';ds.quizType='sight';ds.currentQuiz=0;ds.quizResults=[];save();render();return;}
  const word=nw[idx];cardFlipped=false;
  app.innerHTML=`<div class="flashcard-view">
    <div class="top-bar">
      <button class="btn-back" onclick="goDashboard()">✕</button>
      <div class="progress-bar"><div class="progress-fill" style="background:#FF6B6B;width:${(idx/nw.length)*100}%"></div></div>
      <div class="progress-label">${idx+1}/${nw.length}</div>
    </div>
    <div class="flashcard-stage">
      <div class="card-wrap" onclick="flipCard()">
        <div class="card-inner" id="cardInner">
          <div class="card-face card-front">
            <div class="speaker" onclick="event.stopPropagation();speak('${word.word.replace(/'/g,"\\'")}',0.65)">🔊</div>
            <div class="word">${word.word}</div>
            <div class="tap-hint">👆 点击卡片查看意思</div>
          </div>
          <div class="card-face card-back">
            <div class="meaning">${word.meaning}</div>
            <div class="example">${word.example_en}</div>
            <div class="example-cn">${word.example_zh}</div>
            <div class="ex-speaker" onclick="event.stopPropagation();speak('${word.example_en.replace(/'/g,"\\'")}',0.85)">🔊 朗读例句</div>
          </div>
        </div>
      </div>
    </div>
    <div class="btn-next-wrap">
      <button class="btn-next" id="btnNext" ${!cardFlipped?'disabled':''} onclick="nextCard()">
        ${idx<nw.length-1?'下一个单词 →':'开始测验 →'}
      </button>
    </div>
  </div>`;
  setTimeout(()=>speak(word.word,0.65),300);
}
function flipCard(){cardFlipped=true;document.getElementById('cardInner').classList.add('flipped');const b=document.getElementById('btnNext');if(b)b.disabled=false;}
function nextCard(){A.dailyState.currentCard++;save();renderFC();}

// ===== QUIZ =====
let quizAnswered=false,quizCorrect='',quizWordId=null;
function renderQuiz(){
  const ds=A.dailyState;const qt=ds.quizType;const idx=ds.currentQuiz;
  const nw=ds.newWordIds.map(id=>A.wordBank.find(w=>w.id===id)).filter(Boolean);
  if(idx>=nw.length){if(qt==='sight'){ds.quizType='sound';ds.currentQuiz=0;}else if(qt==='sound'){ds.quizType='spell';ds.currentQuiz=0;}else{finishQuizzes();return;}quizAnswered=false;save();renderQuiz();return;}
  quizAnswered=false;const tw=nw[idx];quizWordId=tw.id;
  if(qt==='spell'){renderSpellQuiz(tw);return;}
  const all=A.wordBank;const dist=pickRandom(all,3,[tw]);const opts=shuffle([tw,...dist]);
  const showWord=qt==='sight';const tl=showWord?'👀 看义选词':'👂 听音选词';
  app.innerHTML=`<div class="quiz-view">
    <div class="top-bar">
      <button class="btn-back" onclick="goDashboard()">✕</button>
      <div class="progress-bar"><div class="progress-fill" style="background:#FF6B6B;width:${(idx/nw.length)*100}%"></div></div>
      <div class="progress-label">${idx+1}/${nw.length}</div>
    </div>
    <div class="quiz-header"><span class="quiz-type">${tl}</span></div>
    <div class="quiz-question">${showWord?`<div class="question-word">${tw.word}</div><div class="question-hint">选出中文意思</div>`:`<button class="speaker-btn" id="speakerBtn" onclick="playQuizSound()">🔊</button><div class="question-hint">听发音，选出单词</div>`}</div>
    <div class="quiz-options" id="quizOps">${opts.map(o=>`<button class="quiz-option" data-w="${showWord?o.meaning:o.word.replace(/'/g,'&#39;')}">${showWord?o.meaning:o.word}</button>`).join('')}</div>
  </div>`;
  quizCorrect=showWord?tw.meaning:tw.word;
  document.querySelectorAll('.quiz-option').forEach(b=>{b.addEventListener('click',()=>{if(quizAnswered)return;quizAnswered=true;handleQuizAnswer(b.dataset.w===quizCorrect,b.dataset.w);});});
  if(!showWord)setTimeout(()=>playQuizSound(),400);
}
function playQuizSound(){const w=A.wordBank.find(w=>w.id===quizWordId);if(!w)return;const b=document.getElementById('speakerBtn');if(b)b.classList.add('playing');speak(w.word,0.65).then(()=>{if(b)b.classList.remove('playing');});}
function handleQuizAnswer(correct,sel){

function finishQuizzes(){
  const ds=A.dailyState;const nids=ds.newWordIds;
  nids.forEach(wid=>{const w=A.wordBank.find(w=>w.id===wid);if(!w)return;const wr=ds.quizResults.filter(r=>r.wordId===wid);const allGood=wr.length===3&&wr.every(r=>r.correct);
    if(allGood){w.reviewLevel=Math.min(5,(w.reviewLevel||0)+2);w.nextReview=getNextReview(w.reviewLevel);w.learnedDate=today();addPoints(PTS_WORD_MASTERED);}
    else{w.reviewLevel=0;w.nextReview=today();w.wrongCount=(w.wrongCount||0)+wr.filter(r=>!r.correct).length;}
  });
  const rw=A.wordBank.filter(w=>w.reviewLevel>=0&&w.nextReview&&w.nextReview<=today()&&!nids.includes(w.id));
  const failed=nids.map(id=>A.wordBank.find(w=>w.id===id)).filter(w=>w&&w.reviewLevel===0);
  const allR=[...rw,...failed];const seen=new Set();const uniq=allR.filter(w=>{const k=w.id;if(seen.has(k))return false;seen.add(k);return true;});
  if(uniq.length>0){ds.phase='review';ds.reviewQueue=uniq.map(w=>w.id);ds.reviewIdx=0;ds.reviewResults=[];}
  else{ds.phase='complete';addPoints(PTS_DAY_COMPLETE);archiveDay();}
  save();render();
}

function archiveDay(){const ds=A.dailyState;const ts=today();if(A.history.find(h=>h.date===ts))return;
  const nl=ds.newWordIds.filter(wid=>{const w=A.wordBank.find(x=>x.id===wid);return w&&w.reviewLevel>=1;}).length;
  const all=[...ds.quizResults,...ds.reviewResults];const c=all.filter(r=>r.correct).length;const wr=all.filter(r=>!r.correct).length;
  A.history.push({date:ts,wordsLearned:nl,wordsReviewed:ds.reviewQueue.length,correct:c,wrong:wr});save();
}
function renderComplete(){
  const ds=A.dailyState;const all=[...ds.quizResults,...ds.reviewResults];const c=all.filter(r=>r.correct).length;
  const total=all.length;const pct=total>0?Math.round(c/total*100):100;
  const nl=ds.newWordIds.filter(wid=>{const w=A.wordBank.find(x=>x.id===wid);return w&&w.reviewLevel>=1;}).length;
  let em,msg;if(pct>=90){em='🏆';msg='你今天表现超级棒！这些单词都难不倒你！';}else if(pct>=70){em='⭐';msg='做得不错！继续保持，你会越来越厉害的！';}else if(pct>=50){em='📚';msg='有进步！多复习几次，这些词就会变成你的好朋友！';}else{em='🌈';msg='没关系，学习新单词需要时间。明天再来，一定会更好！';}
  const streak=A.history.length;const pet=getPetStage(A.points||0);const canExtra=pct>=80&&!ds.isExtra;

  const text=A.readingTexts.find(t=>t.id===textId);

      if((s.match(/\n/g)||[]).length>=2)allWords.push({token:s,isPara:true,isSpace:true,id:'rv_'+allWords.length});

    textId,allWords,

    paragraphIndices:allWords.filter(w=>w.isPara).map(w=>allWords.indexOf(w)),

// ===== GLOBAL NEEDLEMAN-WUNSCH ALIGNMENT =====
// Key fix: uses full DP to find optimal global alignment between
// ALL target words and ALL spoken words. This avoids the greedy
// "one wrong cascades everything" problem.
function alignGlobal(allWords, spokenText) {
  // Build clean target list
  const targets=[],tIndices=[];
  for(let i=0;i<allWords.length;i++){
    if(!allWords[i].isPunct&&!allWords[i].isSpace){
      targets.push(allWords[i].token.toLowerCase().replace(/[^a-z'-]/g,''));
      tIndices.push(i);
    }
  }
  const spoken=spokenText.trim().split(/\s+/).filter(x=>x).map(x=>x.toLowerCase().replace(/[^a-z'-]/g,''));
  if(!targets.length)return resultsForSend(allWords);
  if(!spoken.length){
    // No speech yet — all pending
    const r=new Array(allWords.length);for(let i=0;i<r.length;i++){
      if(allWords[i].isPunct||allWords[i].isSpace)r[i]=null;
      else r[i]={type:'pending',idx:i};
    }
    return {results:r,lastCorrect:-1};
  }

  const m=targets.length,n=spoken.length;
  const dp=Array(m+1).fill(null).map(()=>Array(n+1).fill(Infinity));
  dp[0][0]=0;
  for(let i=1;i<=m;i++)dp[i][0]=dp[i-1][0]+1;
  for(let j=1;j<=n;j++)dp[0][j]=dp[0][j-1]+1;

  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      const a=targets[i-1],b=spoken[j-1];
      let cost=1;
      if(a===b)cost=0;
      else if(a.length>=2&&b.length>=2&&(a.includes(b)||b.includes(a)||a.slice(0,-1)===b||a===b.slice(0,-1)||a+'s'===b||a===b+'s'||a+'ing'===b||a===b+'ing'||a+'ed'===b||a===b+'ed'))cost=0.3;
      dp[i][j]=Math.min(dp[i-1][j-1]+cost, dp[i-1][j]+1, dp[i][j-1]+1);
    }
  }

  // Backtrack
  const results=new Array(allWords.length).fill(null);
  for(let i=0;i<allWords.length;i++){
    if(allWords[i].isPunct||allWords[i].isSpace)results[i]=null;
    else results[i]={type:'pending',idx:i};
  }
  let i=m,j=n;
  while(i>0||j>0){
    if(i>0&&j>0){
      const a=targets[i-1],b=spoken[j-1];
      let cost=1;
      if(a===b)cost=0;
      else if(a.length>=2&&b.length>=2&&(a.includes(b)||b.includes(a)||a.slice(0,-1)===b||a===b.slice(0,-1)||a+'s'===b||a===b+'s'||a+'ing'===b||a===b+'ing'||a+'ed'===b||a===b+'ed'))cost=0.3;
      if(dp[i][j]===dp[i-1][j-1]+cost){
        results[tIndices[i-1]]={type:cost===0?'correct':(cost<1?'fuzzy':'wrong'),idx:tIndices[i-1]};
        i--;j--;continue;
      }
    }
    if(i>0&&dp[i][j]===dp[i-1][j]+1){results[tIndices[i-1]]={type:'skipped',idx:tIndices[i-1]};i--;continue;}
    if(j>0){j--;continue;}
    break;
  }

  // Find last correct — ensure ALL content words before it are checked
  let lastCorrect=-1;
  for(let i=0;i<results.length;i++){
    if(results[i]&&(results[i].type==='correct'||results[i].type==='fuzzy'))lastCorrect=i;
  }
  // Extend: if lastCorrect is at position N, also check if N+1 is null (guaranteed non-content) — it's fine
  return {results,lastCorrect};
}

}

// ===== LISTENING ENGINE — continuous, global alignment =====
function startReadingListen(){
  if(!readingState)return;
  stopAllReading();
  const R=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!R){alert('浏览器不支持语音识别，请使用 Chrome');return;}

  readingRec=new R();
  readingRec.lang='en-US';
  readingRec.interimResults=true;
  readingRec.continuous=true;
  readingRec.maxAlternatives=3;

  readingState.isListening=true;
  readingState.silenceStart=null;
  readingState.accumulatedTranscript='';
  readingState.bestTranscript='';
  readingState.lastCorrectIdx=-1;
  readingState.currentHighlight=0;
  readingState.errorWords={};
  readingState.allWords.forEach(w=>w._type=undefined);
  renderReadingActive();

  let silenceTimer=null;

  readingRec.onresult=function(e){
    // Build the most complete transcript possible
    // Strategy: accumulate ALL final results, then append latest interim at end
    let base='';
    let latestInterim='';
    for(let i=0;i<e.results.length;i++){
      const r=e.results[i];
      let best='',bestConf=0;
      for(let j=0;j<r.length;j++){if(r[j].confidence>bestConf){best=r[j].transcript;bestConf=r[j].confidence;}}
      if(!best)continue;
      if(r.isFinal){base+=(base?' ':'')+best;}
      else{latestInterim=best;} // only keep latest interim
    }
    // Append latest interim at the end — it represents the most recent speech
    let transcript=(base+' '+latestInterim).trim().toLowerCase().replace(/\s+/g,' ');
    if(!transcript)return;
    readingState.bestTranscript=transcript;
    readingState.silenceStart=null;
    clearTimeout(silenceTimer);

    processAlignment(transcript);
    silenceTimer=setTimeout(checkSilenceAutoStop,5000);
  };

  readingRec.onend=function(){
    // CRITICAL FIX: after onend, SpeechRecognition may have additional results
    // that were not yet delivered via onresult. We do one final alignment.
    // If we have a transcript, run one last alignment pass.
    if(readingState&&readingState.bestTranscript){
      processAlignment(readingState.bestTranscript);
    }
    readingRec=null;
    if(!readingState)return;
    readingState.isListening=false;
    if(readingState.mode==='auto'){setTimeout(()=>finishReading(),2000);}
    else renderReadingActive();
  };

  readingRec.onerror=function(e){
    if(e.error==='no-speech'){
      try{if(readingState&&readingState.isListening){readingRec.start();return;}}catch(x){}
    }
    readingRec=null;
    if(readingState)readingState.isListening=false;
    renderReadingActive();
  };

  try{readingRec.start();}catch(x){readingState.isListening=false;renderReadingActive();}
}

// Shared alignment processing (called from onresult and onend)
function processAlignment(transcript){
  if(!readingState)return;
  const {results,lastCorrect}=alignGlobal(readingState.allWords,transcript);
  let errBeeped=false;
  for(let i=0;i<results.length;i++){
    const w=readingState.allWords[i];
    if(!results[i]||w.isPunct||w.isSpace)continue;
    const oldType=w._type;
    w._type=results[i].type;
    if(w._type==='wrong'&&oldType!=='wrong'&&!errBeeped){beep(350,50,0.15);errBeeped=true;}
    if(w._type==='wrong'||w._type==='skipped'){
      if(!readingState.errorWords[w.id])readingState.errorWords[w.id]={target:w.token,spoken:'',count:0};
      readingState.errorWords[w.id].count++;
      if(w._type==='wrong')readingState.errorWords[w.id].spoken=transcript.split(/\s+/).slice(0,results.filter(x=>x&&x.type==='correct').length+1).pop()||'??';
    }
  }
  readingState.lastCorrectIdx=Math.max(readingState.lastCorrectIdx,lastCorrect);
  readingState.currentHighlight=readingState.lastCorrectIdx+1;
  if(readingState.currentHighlight>=readingState.allWords.length)readingState.currentHighlight=readingState.allWords.length-1;
  updateReadingFullDOM(readingState.allWords,transcript);
  save();
}

function checkSilenceAutoStop(){
  if(!readingState||!readingState.isListening)return;
  if(readingState.silenceStart===null)readingState.silenceStart=Date.now();
  if(Date.now()-readingState.silenceStart>=5000){
    readingState.isListening=false;stopAllReading();finishReading();
  }
}

function updateReadingFullDOM(allWords,transcript){
  const heardEl=document.getElementById('readingHeard');
  if(heardEl)heardEl.innerHTML='听到: <strong>'+transcript+'</strong>';
  for(let i=0;i<allWords.length;i++){
    const w=allWords[i];
    if(w.isPunct||w.isSpace)continue;
    const el=document.getElementById(w.id);
    if(!el)continue;
    el.classList.remove('correct','wrong','skipped','current');
    if(w._type==='correct'||w._type==='fuzzy')el.classList.add('correct');
    else if(w._type==='wrong')el.classList.add('wrong');
    else if(w._type==='skipped')el.classList.add('skipped');
    if(i===readingState.currentHighlight)el.classList.add('current');
  }
  if(readingState.currentHighlight>=0&&readingState.currentHighlight<allWords.length){
    const curEl=document.getElementById(allWords[readingState.currentHighlight]?.id);
    if(curEl)curEl.scrollIntoView({behavior:'smooth',block:'center'});
  }
}

function stopReadingListen(){stopAllReading();if(!readingState)return;readingState.isListening=false;finishReading();}

// ===== FINISH & REPORT =====
function finishReading(){
  stopAllReading();
  if(!readingState)return;
  const contentWords=readingState.contentWords;
  const totalWords=contentWords.length;
  let correctCount=0;
  contentWords.forEach(w=>{if(w._type==='correct'||w._type==='fuzzy')correctCount++;});
  const errMap=readingState.errorWords||{};
  const errorList=Object.values(errMap).sort((a,b)=>b.count-a.count);
  const totalErrors=errorList.reduce((s,e)=>s+e.count,0);
  const pct=totalWords>0?Math.round((totalWords-totalErrors)/totalWords*100):100;
  const rec={textId:readingState.textId,date:today(),totalWords,totalErrors,score:pct,errorList};
  A.readingHistory.push(rec);
  const text=A.readingTexts.find(t=>t.id===readingState.textId);
  if(text){text.lastRead=today();if(text.bestScore===null||pct>text.bestScore)text.bestScore=pct;}
  errorList.forEach(e=>{const w=A.wordBank.find(x=>x.word.toLowerCase()===e.target.toLowerCase());if(w)addWrong(w.id,'朗读:'+(e.spoken||'未读'),'朗读');});
  if(pct>=90)addPoints(10);else if(pct>=70)addPoints(5);
  readingState.finalResults={score:pct,totalWords,totalErrors,errorList};
  save();A.dailyState.phase='reading-report';renderReadingReport();
}

function renderReadingReport(){
  const fr=readingState?.finalResults;if(!fr){showReading();return;}
  const text=A.readingTexts.find(t=>t.id===readingState.textId);
  let em,msg;
  if(fr.score>=90){em='\U0001f3c6';msg='朗读非常棒！发音很标准！';}
  else if(fr.score>=70){em='\U0001f44d';msg='整体不错，注意易错单词发音。';}
  else if(fr.score>=50){em='\U0001f4da';msg='还有进步空间，多跟读几遍会更好！';}
  else{em='\U0001f4aa';msg='别灰心，多练习就会进步！';}
  app.innerHTML=`<div class="page-view">
    <div class="top-bar"><button class="btn-back" onclick="stopAllReading();showReading();">←</button><h2 style="flex:1;">\U0001f4ca 朗读报告</h2><div style="width:40px;"></div></div>
    <div class="complete-view pop" style="padding:0;">
      <div class="emoji">${em}</div><h2>${text?text.title:'朗读完成'}</h2><p class="message">${msg}</p>
      <div class="complete-stats"><div class="complete-stat"><div class="val green">${fr.totalWords-fr.totalErrors}</div><div class="lbl">正确词数</div></div><div class="complete-stat"><div class="val" style="color:#C92A2A;">${fr.totalErrors}</div><div class="lbl">错误词数</div></div><div class="complete-stat"><div class="val yellow">${fr.score}%</div><div class="lbl">正确率</div></div></div>
      <p style="color:#636E72;font-size:0.85rem;margin-bottom:12px;">全文共 ${fr.totalWords} 个单词</p>
      ${fr.errorList.length>0?`<div style="background:white;border-radius:12px;padding:12px;margin-bottom:12px;"><h4 style="margin-bottom:8px;font-size:0.9rem;">⚠ 易错单词 — 点击听发音</h4><div style="line-height:2;">${fr.errorList.map(e=>`<span class="reading-report-word" onclick="speak('${e.target.replace(/'/g,"\\'")}',0.65)">${e.target} ×${e.count}</span>`).join(' ')}</div></div>`:''}
      <button class="btn-extra" onclick="startReading(readingState.textId);setTimeout(()=>startReadingListen(),400);">\U0001f501 重新朗读</button>
      <button class="btn-done" onclick="stopAllReading();showReading();">\U0001f3e0 返回列表</button>
    </div>
  </div>`;
}


// ===== NAVIGATION =====
function goDashboard(){stopVoice('spellMic');initDaily();save();quizAnswered=false;rvAnswered=false;cardFlipped=false;spellAttempts=0;A.dailyState.phase=A.dailyState.date===today()&&(A.dailyState.newWordIds.length>0||A.dailyState.reviewQueue.length>0)?null:'complete';renderDashboard();}

// ===== INIT =====
function init(){
  A=load();
  if(!A.wrongBook)A.wrongBook={};
  if(A.points===undefined)A.points=0;
  if(A.petNotifiedLevel===undefined)A.petNotifiedLevel=0;
  // Migration: ensure all words have correctStreak
  A.wordBank.forEach(w=>{if(w.correctStreak===undefined)w.correctStreak=0;});
  if(!A.readingTexts)A.readingTexts=[];
  if(!A.readingHistory)A.readingHistory=[];
  initDaily();render();
}
init();
</script>
