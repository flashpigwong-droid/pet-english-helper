<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET英语学习助手</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav" id="topNav">
        <div class="nav-brand">
            <span class="nav-logo">📝</span>
            <span class="nav-title">PET英语助手</span>
        </div>
        <div class="nav-links">
            <button class="nav-btn active" data-page="practice" aria-label="今日练习">
                <span class="nav-icon">📖</span>
                <span class="nav-label">今日练习</span>
            </button>
            <button class="nav-btn" data-page="mistakes" aria-label="错词本">
                <span class="nav-icon">📋</span>
                <span class="nav-label">错词本</span>
            </button>
            <button class="nav-btn" data-page="review" aria-label="智能复习">
                <span class="nav-icon">🔄</span>
                <span class="nav-label">智能复习</span>
            </button>
            <button class="nav-btn" data-page="progress" aria-label="学习进度">
                <span class="nav-icon">📊</span>
                <span class="nav-label">学习进度</span>
            </button>
            <button class="nav-btn" data-page="browse" aria-label="词汇库">
                <span class="nav-icon">📚</span>
                <span class="nav-label">词汇库</span>
            </button>
        </div>
    </nav>

    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="bottom-nav-btn active" data-page="practice">
            <span class="bottom-nav-icon">📖</span>
            <span class="bottom-nav-label">练习</span>
        </button>
        <button class="bottom-nav-btn" data-page="mistakes">
            <span class="bottom-nav-icon">📋</span>
            <span class="bottom-nav-label">错词本</span>
        </button>
        <button class="bottom-nav-btn" data-page="review">
            <span class="bottom-nav-icon">🔄</span>
            <span class="bottom-nav-label">复习</span>
        </button>
        <button class="bottom-nav-btn" data-page="progress">
            <span class="bottom-nav-icon">📊</span>
            <span class="bottom-nav-label">进度</span>
        </button>
        <button class="bottom-nav-btn" data-page="browse">
            <span class="bottom-nav-icon">📚</span>
            <span class="bottom-nav-label">词库</span>
        </button>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content" id="mainContent">
        <!-- Practice Page -->
        <section class="page active" id="page-practice">
            <div class="page-header">
                <h1>今日练习</h1>
                <p class="page-subtitle">听音拼写，扎实掌握每个单词</p>
            </div>
            <div class="practice-setup" id="practiceSetup">
                <div class="setup-card">
                    <h3>开始新练习</h3>
                    <div class="setup-options">
                        <div class="option-group">
                            <label>练习模式</label>
                            <div class="mode-selector">
                                <button class="mode-btn active" data-mode="spelling">📝 听音拼写</button>
                                <button class="mode-btn" data-mode="meaning">🔤 释义匹配</button>
                                <button class="mode-btn" data-mode="gapfill">✏️ 选词填空</button>
                            </div>
                        </div>
                        <div class="option-group">
                            <label for="wordCount">每轮单词数</label>
                            <select id="wordCount">
                                <option value="10">10 个</option>
                                <option value="15" selected>15 个</option>
                                <option value="20">20 个</option>
                            </select>
                        </div>
                        <div class="option-group">
                            <label for="difficultyFilter">难度选择</label>
                            <select id="difficultyFilter">
                                <option value="all" selected>全部难度</option>
                                <option value="L1">L1 基础必备</option>
                                <option value="L2">L2 进阶提升</option>
                                <option value="L3">L3 拓展挑战</option>
                            </select>
                        </div>
                        <div class="option-group">
                            <label for="speedSelect">朗读语速</label>
                            <select id="speedSelect">
                                <option value="0.7">慢速</option>
                                <option value="1.0" selected>正常</option>
                                <option value="1.3">快速</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn-primary" id="startPractice">
                        <span class="btn-icon">🚀</span> 开始练习
                    </button>
                </div>
                <div class="setup-card continue-card" id="continueCard" style="display:none;">
                    <h3>继续上次练习</h3>
                    <p>你有一个未完成的练习，已完成 <span id="continueProgress">0/15</span> 个单词。</p>
                    <button class="btn-secondary" id="continuePractice">继续练习</button>
                    <button class="btn-text" id="discardPractice">放弃，开始新的</button>
                </div>
            </div>
            <div class="practice-active" id="practiceActive" style="display:none;">
                <!-- Dynamic content rendered by JS -->
            </div>
            <div class="practice-result" id="practiceResult" style="display:none;">
                <!-- Dynamic content rendered by JS -->
            </div>
        </section>

        <!-- Mistakes Page -->
        <section class="page" id="page-mistakes">
            <div class="page-header">
                <h1>错词本</h1>
                <p class="page-subtitle">集中攻克薄弱单词</p>
            </div>
            <div class="mistakes-content" id="mistakesContent">
                <!-- Dynamic content rendered by JS -->
            </div>
        </section>

        <!-- Review Page -->
        <section class="page" id="page-review">
            <div class="page-header">
                <h1>智能复习</h1>
                <p class="page-subtitle">基于记忆曲线，及时巩固</p>
            </div>
            <div class="review-content" id="reviewContent">
                <!-- Dynamic content rendered by JS -->
            </div>
        </section>

        <!-- Progress Page -->
        <section class="page" id="page-progress">
            <div class="page-header">
                <h1>学习进度</h1>
                <p class="page-subtitle">追踪你的每一点进步</p>
            </div>
            <div class="progress-content" id="progressContent">
                <!-- Dynamic content rendered by JS -->
            </div>
        </section>

        <!-- Browse Page -->
        <section class="page" id="page-browse">
            <div class="page-header">
                <h1>词汇库</h1>
                <p class="page-subtitle">浏览和搜索 PET 词汇</p>
            </div>
            <div class="browse-content" id="browseContent">
                <!-- Dynamic content rendered by JS -->
            </div>
        </section>
    </main>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <!-- Modal overlay -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script src="js/vocabulary.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/srs.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
